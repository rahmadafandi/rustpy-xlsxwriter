version: 2
updates:
  # Rust crates (Cargo.toml / Cargo.lock)
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used in workflows — batch all updates into one PR/week.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns: ["*"]

  # Python deps (requirements.txt + pyproject test extras) — batch minor+patch.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]
