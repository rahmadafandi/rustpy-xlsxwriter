name: Docs

on:
  push:
    branches: [master]
    paths:
      - "rustpy_xlsxwriter/**"
      - "src/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      # `pip install .` builds the extension through the maturin backend,
      # so pdoc can import the real module and read its docstrings + .pyi.
      - name: Build & install package + pdoc
        run: pip install . pdoc

      - name: Generate API docs
        run: pdoc -o site rustpy_xlsxwriter

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
